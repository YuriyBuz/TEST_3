<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Техніка Безпеки (Виробництво Соусів)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --primary: #059669; --danger: #dc2626; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; padding-bottom: 2rem; }
        .card { background-color: var(--card-bg); border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .option-btn { transition: all 0.2s; border: 2px solid #e2e8f0; position: relative; }
        .option-btn:not(.disabled):hover { border-color: var(--primary); background-color: #f0fdf4; }
        .option-btn.correct-choice { border-color: var(--primary) !important; background-color: #ecfdf5 !important; }
        .option-btn.wrong-choice { border-color: var(--danger) !important; background-color: #fef2f2 !important; }
        .option-btn.disabled { cursor: default; opacity: 0.7; }
        .feedback-box { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        .spinner { animation: rotate 2s linear infinite; width: 16px; height: 16px; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="container mx-auto max-w-2xl p-4 sm:p-6">
        <header class="text-center mb-6 pt-4">
            <img src="https://foodline-production.com/wp-content/uploads/2021/10/3752781497_3752781497.webp" alt="Logo" class="w-24 h-auto mx-auto mb-4 rounded-xl shadow-sm bg-white p-1" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\'><rect width=\'100\' height=\'100\' fill=\'%23eee\'/><text x=\'50\' y=\'50\' font-family=\'Arial\' font-size=\'14\' text-anchor=\'middle\' dy=\'.3em\' fill=\'%23999\'>Logo</text></svg>'">
            <div class="flex items-center justify-center gap-2 mb-1">
                <div id="statusDot" class="w-2 h-2 rounded-full bg-green-500"></div>
                <span id="statusText" class="text-xs font-bold text-slate-500 uppercase tracking-widest">Онлайн</span>
            </div>
            <h1 class="text-2xl font-bold text-emerald-800">Тест із Техніки Безпеки</h1>
            <p class="text-slate-500 text-sm">Виробництво соусів | Охорона праці</p>
        </header>

        <div id="step-login" class="card p-6 rounded-2xl">
            <div class="bg-emerald-50 border-l-4 border-emerald-500 p-4 mb-6">
                <h3 class="font-bold text-emerald-800 text-sm">Інформація:</h3>
                <p class="text-xs text-emerald-700 mt-1">Результати записуються. Прохідний бал: 18 правильних відповідей.</p>
            </div>
            <label class="block text-sm font-bold mb-2 text-slate-700">Оберіть ПІБ:</label>
            <select id="employeeSelect" class="w-full p-3 border border-gray-300 rounded-xl bg-white text-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 mb-6"><option value="">-- Натисніть для вибору --</option></select>
            <button onclick="startTest()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg transition transform active:scale-95">РОЗПОЧАТИ ТЕСТ</button>
        </div>

        <div id="step-quiz" class="hidden">
            <div class="flex justify-between items-center mb-4 px-2">
                <span class="text-xs font-bold text-slate-400 uppercase">Питання <span id="q-current">1</span> / <span id="q-total-counter">0</span></span>
                <div class="w-1/2 bg-gray-200 rounded-full h-2"><div id="progress-bar" class="bg-emerald-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div></div>
            </div>
            <div class="card p-6 rounded-2xl min-h-[420px] flex flex-col justify-between">
                <div>
                    <h2 id="question-text" class="text-xl font-bold mb-6 text-slate-800 leading-tight"></h2>
                    <div id="options-container" class="space-y-3"></div>
                    <div id="feedback-container" class="hidden mt-6 feedback-box">
                        <div id="feedback-type" class="p-4 rounded-xl border-l-4">
                            <div class="flex items-center mb-1"><span id="feedback-icon" class="mr-2"></span><span id="feedback-title" class="font-bold"></span></div>
                            <p id="feedback-text" class="text-sm italic"></p>
                        </div>
                    </div>
                </div>
                <button id="next-btn" onclick="nextQuestion()" disabled class="mt-8 w-full bg-gray-300 text-gray-500 font-bold py-4 rounded-xl cursor-not-allowed transition">Наступне питання</button>
            </div>
        </div>

        <div id="step-result" class="hidden text-center">
            <div class="card p-8 rounded-3xl">
                <div id="sync-indicator" class="mb-4 text-[10px] font-black uppercase tracking-tighter text-amber-500 flex items-center justify-center gap-2"><span>Синхронізація...</span><div class="spinner border-2 border-amber-500 border-t-transparent rounded-full"></div></div>
                <div id="icon-result" class="text-6xl mb-4"></div>
                <h2 id="title-result" class="text-3xl font-bold mb-1"></h2>
                <div class="py-6 my-4 border-y border-slate-100"><p class="text-5xl font-black text-slate-800"><span id="score-val">0</span> / <span id="score-total">0</span></p><p id="percentage-val" class="text-sm font-bold text-emerald-600 mt-2 bg-emerald-50 inline-block px-3 py-1 rounded-full"></p></div>
                <p id="msg-result" class="text-base mb-8 px-4 text-slate-500 leading-relaxed"></p>
                <div class="mb-8 flex justify-center"><div id="qrcode" class="p-2 bg-white border rounded-xl"></div></div>
                <button onclick="location.reload()" class="w-full py-4 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl transition">Повернутися на головну</button>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzkzOkyk2zwObyZThhZE1ACAPYAtwPMZsSoUij9yHw_vEKgmkImUOCVlk-F_SH06b_w/exec';
        const OFFLINE_QUEUE_KEY = 'sauce_safety_offline_queue';
        
        // Оновлений список працівників
        const employeesList = [
            "Кішка Сергій Володимирович", "Сосновський Валерій Петрович", "Галагін Євгеній Ярославович", 
            "Гора Андрій Олександрович", "Максімюк Анатолій Вікторович", "Садиріна Ольга Анатоліївна", 
            "Солдатова Ірина Володимирівна", "Загура Іван Борисович", "Козурак Іван Миколайович", 
            "Соботович Лілія Михайлівна", "Огаркова Марія Володимирівна", "Попадюк Анжела Миколаївна", 
            "Шута Олександра Сергіївна", "Король Юрій Валерійович", "Бондаренко Валерій Валентинович", 
            "Максімюк Анатолій Анатолійович", "Марків Олександр Йосипович", "Єрко Віктор Андрійович", 
            "Корнієнко Жанна Василівна", "Фисина Наталія Григорівна", "Воробей Людмила Леонідівна", 
            "Ворожко Дарья Вячеславівна", "Козило Василь Вячеславович", "Іванчук Олександр Анатолійович", 
            "Кораблін Дмитро", "Горпиніч Олексій Станіславович", "Жук Денис", "Снітко Ярослав Іванович", 
            "Гончарук Ольга Михайлівна", "Хлупянець Віталій Анатолійович", "Шанчук Павло Сергійович", 
            "Ворона Інна Василівна", "Черніцький Назарій Вячеславович", "Загоруйко Наталія Володимирівна", 
            "Буквай Ірина Вікторівна", "Вискірко Руслана Михайлівна", "Соботович Тетяна Михайлівна", 
            "Кучера Галина Іванівна", "Миняйло Оксана Вадимівна", "Миняйло Анастасія Вадимівна", 
            "Долинюк Олександр Миколайович", "Фалько Анатолій Олександрович", "Лавриненко Максим Миколайович", 
            "Дудник Сергій Васильович", "Бондаренко Станіслав Олександрович"
        ];

        // 20 запитань (включаючи хитрі ситуативні питання)
        const originalQuestions = [
            { q: "Які вимоги до зовнішнього вигляду у виробничій зоні?", a: ["Виданий спецодяг, спецвзуття, сіточка для волосся", "Чистий домашній одяг", "Спецодяг, але дозволяється носити обручку"], ci: 0, h: "Прикраси, лак для нігтів та годинники категорично заборонені (харчова безпека)." },
            { q: "Що робити при погіршенні самопочуття або наявності відкритих ран?", a: ["Прийняти ліки і працювати далі", "Продовжувати роботу в рукавичках", "Негайно повідомити керівника або майстра"], ci: 2, h: "Це пряма вимога біологічної безпеки продукції." },
            { q: "ХИТРЕ ПИТАННЯ: Температура в паровому котлі впала до безпечної, але на манометрі залишковий тиск 0.2 бар. Ваші дії?", a: ["Відкрити люк обережно в терморукавицях", "Зачекати повного падіння тиску виключно до нульової (0) позначки", "Привідкрити вентиль вручну для швидкого стравлювання"], ci: 1, h: "Навіть мінімальний тиск може спричинити різкий викид гарячої пари." },
            { q: "ХИТРЕ ПИТАННЯ: Електрощиток має найвищий рівень вологозахисту. Чи можна мити його прямим струменем води зі шланга під час CIP-мийки?", a: ["Так, він для цього розрахований інженерами", "Тільки якщо він попередньо вимкнений", "Категорично ні, пряме попадання струменя води на пульти суворо заборонено завжди"], ci: 2, h: "Захист не гарантує 100% герметичності при прямому напорі води." },
            { q: "Ваші дії, якщо тару або продукт заклинило на конвеєрі?", a: ["Дістати тару голими руками під час руху", "Збільшити швидкість лінії", "Спочатку натиснути E-stop, потім діставати гачками"], ci: 2, h: "Заборонено лізти руками в рухомі механізми до їхньої повної зупинки." },
            { q: "Чи дозволяється обдувати власний одяг або тіло стисненим повітрям?", a: ["Так, якщо це зробити швидко", "Категорично заборонено, це вкрай небезпечно", "Можна, якщо тиск на манометрі невеликий"], ci: 1, h: "Це може викликати емболію (пухирці в крові) або пошкодити очі." },
            { q: "Як правильно паркувати ручний гідравлічний візок (рохлю)?", a: ["Відвезти в зону паркування та повністю опустити вила до підлоги", "Залишити в проході з піднятими вилами", "Залишити біля евакуаційного виходу"], ci: 0, h: "Підняті вила рохлі — найчастіша причина травмування ніг колег." },
            { q: "Яке головне правило розведення концентрованої хімії?", a: ["Додавати воду у кислоту/луг", "Змішувати в будь-якому порядку", "Завжди додавати кислоту/луг у воду"], ci: 2, h: "Якщо лити воду в кислоту, відбудеться бурхлива реакція з розбризкуванням." },
            { q: "Скільки часу потрібно промивати очі при потраплянні хімікатів?", a: ["2-3 хвилини", "Не менше 15 хвилин проточною водою", "Достатньо протерти сухою серветкою"], ci: 1, h: "Хімічні опіки вимагають тривалої нейтралізації великою кількістю води." },
            { q: "Що робити, якщо ви розлили соус чи олію на підлогу?", a: ["Повідомити прибиральницю в кінці зміни", "Залишити як є, це виробничий процес", "Негайно прибрати розлив або огородити знаком"], ci: 2, h: "Слизька підлога — причина травм. Реакція має бути негайною." },
            { q: "Як правильно піднімати важкий вантаж (наприклад, мішок)?", a: ["За рахунок сили ніг, присідаючи з рівною спиною", "За рахунок сили спини, нахилившись вперед", "На витягнутих руках"], ci: 0, h: "Зберігайте спину рівною, щоб уникнути пошкодження хребта." },
            { q: "ХИТРЕ ПИТАННЯ: Колега пішов додому, але забув зняти свій замок LOTO з рубильника міксера. Майстер наказує вам зрізати замок, щоб запустити лінію. Ваші дії?", a: ["Виконати наказ майстра, адже він несе відповідальність", "Відмовитися. Замок має право зняти лише його власник (або за спец. аварійною процедурою)", "Зрізати замок самостійно, якщо колега не бере слухавку"], ci: 1, h: "Зняття чужого замка LOTO без спеціальної комісійної процедури є грубим порушенням." },
            { q: "Який інструмент дозволено використовувати для розпакування сировини?", a: ["Звичайні кухонні ножі", "Власні гострі канцелярські ножі", "Лише видані безпечні ножі з прихованим лезом"], ci: 2, h: "Різати завжди необхідно у напрямку ВІД себе, не на вазі." },
            { q: "Ваші дії при сигналі пожежної тривоги?", a: ["Йти в роздягальню, щоб переодягнутися", "Вимкнути обладнання і негайно йти до аварійного виходу", "Заховатися в безпечному місці в цеху"], ci: 1, h: "Евакуація має бути миттєвою, не витрачайте час на особисті речі." },
            { q: "Які засоби захисту слуху (беруші) дозволені на виробництві?", a: ["Беруші синього кольору з металевим елементом", "Звичайні навушники для музики", "Будь-які поролонові беруші з аптеки"], ci: 0, h: "Металевий елемент необхідний, щоб детектор металу знайшов берушу в разі її втрати." },
            { q: "ХИТРЕ ПИТАННЯ: Ви розвантажуєте машину і вам потрібно залишити піддон у пішохідному проході буквально на 2 хвилини. Це дозволено системою 5S?", a: ["Так, якщо попередити колег, що ви швидко", "Ні, проходи та доступ до вогнегасників мають бути вільними завжди, без винятків", "Так, якщо поставити поруч попереджувальний конус"], ci: 1, h: "Навіть 2 хвилини можуть коштувати комусь здоров'я під час екстреної ситуації." },
            { q: "Які засоби використовуються для перев'язки порізу (мікротравми)?", a: ["Звичайний прозорий або тілесний пластир", "Пластир не потрібен, якщо кров зупинилася", "Спеціальний синій пластир з металевою смужкою + напальчник"], ci: 2, h: "Синій колір легко помітити в продукті, а метал виявляється детектором." },
            { q: "ХИТРЕ ПИТАННЯ: Ви розбили банку, але на вас одягнені спеціальні товсті кольчужні рукавички. Чи дозволяється вам зібрати великі уламки руками?", a: ["Так, рукавички надійно захистять від порізів", "Тільки великі уламки, а дрібні - щіткою", "Категорично ні, будь-яке скло збирається виключно червоним інвентарем (щіткою/совком)"], ci: 2, h: "Збирати скло руками заборонено незалежно від того, які на вас рукавички." },
            { q: "Скільки точок опори потрібно зберігати під час використання драбини?", a: ["Одну", "Дві", "Три"], ci: 2, h: "Правило 'трьох точок' (наприклад, дві ноги і одна рука) захищає від падіння." },
            { q: "Що необхідно зробити в першу чергу при сигналі 'Повітряна тривога'?", a: ["Одразу бігти в укриття, кинувши все", "Продовжувати працювати до окремої вказівки", "Перевести обладнання в безпечний режим (вимкнути нагрів, зупинити конвеєри)"], ci: 2, h: "Безпечна зупинка необхідна для того, щоб уникнути пожежі чи аварії під час вашої відсутності." }
        ];

        let currentQIndex = 0, score = 0, userName = "", selectedOptionIndex = null, testLog = [], currentOptions = [];

        document.addEventListener('DOMContentLoaded', () => {
            const select = document.getElementById('employeeSelect');
            // Сортування списку за українською абеткою
            employeesList.sort((a, b) => a.localeCompare(b, 'uk')).forEach(name => { 
                const opt = document.createElement('option'); 
                opt.value = name; 
                opt.textContent = name; 
                select.appendChild(opt); 
            });
            document.getElementById('q-total-counter').innerText = originalQuestions.length;
            
            updateNetworkStatus();
            window.addEventListener('online', () => { updateNetworkStatus(); processOfflineQueue(); });
            window.addEventListener('offline', updateNetworkStatus);
        });

        function shuffle(a) { 
            for (let i = a.length - 1; i > 0; i--) { 
                const j = Math.floor(Math.random() * (i + 1)); 
                [a[i], a[j]] = [a[j], a[i]]; 
            } 
            return a; 
        }

        function startTest() { 
            userName = document.getElementById('employeeSelect').value; 
            if (!userName) { alert("Оберіть ПІБ зі списку"); return; } 
            document.getElementById('step-login').classList.add('hidden'); 
            document.getElementById('step-quiz').classList.remove('hidden'); 
            renderQuestion(); 
        }

        function renderQuestion() {
            const q = originalQuestions[currentQIndex];
            document.getElementById('q-current').innerText = currentQIndex + 1;
            document.getElementById('progress-bar').style.width = `${(currentQIndex / originalQuestions.length) * 100}%`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('feedback-container').classList.add('hidden');
            
            const container = document.getElementById('options-container'); 
            container.innerHTML = '';
            
            const nextBtn = document.getElementById('next-btn'); 
            nextBtn.disabled = true;
            nextBtn.className = "mt-8 w-full bg-gray-300 text-gray-500 font-bold py-4 rounded-xl cursor-not-allowed transition";
            nextBtn.innerText = currentQIndex === originalQuestions.length - 1 ? "Завершити тест" : "Наступне питання";
            
            currentOptions = q.a.map((text, i) => ({ text, isCorrect: i === q.ci }));
            shuffle(currentOptions);
            
            currentOptions.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-4 rounded-xl text-lg flex items-center mb-2 leading-tight';
                btn.innerHTML = `<span class="w-8 h-8 rounded-full border-2 border-slate-200 flex-shrink-0 flex items-center justify-center mr-3 text-xs font-bold text-slate-400">${String.fromCharCode(65 + i)}</span> <span>${opt.text}</span>`;
                btn.onclick = () => showFeedback(i, btn);
                container.appendChild(btn);
            });
        }

        function showFeedback(idx, btn) {
            if (selectedOptionIndex !== null) return;
            selectedOptionIndex = idx;
            const isCorrect = currentOptions[idx].isCorrect;
            
            if (isCorrect) { 
                score++; 
                btn.classList.add('correct-choice'); 
                testLog.push('✅'); 
            } else { 
                btn.classList.add('wrong-choice'); 
                testLog.push('❌'); 
                document.querySelectorAll('.option-btn').forEach((b, i) => { 
                    if (currentOptions[i].isCorrect) b.classList.add('correct-choice'); 
                }); 
            }
            
            document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));
            
            const fbox = document.getElementById('feedback-container');
            const ftype = document.getElementById('feedback-type');
            const ficon = document.getElementById('feedback-icon');
            const ftitle = document.getElementById('feedback-title');
            const ftext = document.getElementById('feedback-text');
            
            fbox.classList.remove('hidden'); 
            ftext.innerText = originalQuestions[currentQIndex].h;
            
            if (isCorrect) { 
                ftype.className = "p-4 rounded-xl border-l-4 border-emerald-500 bg-emerald-50 text-emerald-800"; 
                ficon.innerText = "✅"; 
                ftitle.innerText = "Вірно!"; 
            } else { 
                ftype.className = "p-4 rounded-xl border-l-4 border-red-500 bg-red-50 text-red-800"; 
                ficon.innerText = "❌"; 
                ftitle.innerText = "Помилка!"; 
            }
            
            const nextBtn = document.getElementById('next-btn'); 
            nextBtn.disabled = false; 
            nextBtn.className = "mt-8 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg transition transform active:scale-95";
        }

        function nextQuestion() { 
            selectedOptionIndex = null; 
            currentQIndex++; 
            if (currentQIndex < originalQuestions.length) renderQuestion(); 
            else showResults(); 
        }

        function showResults() {
            document.getElementById('step-quiz').classList.add('hidden'); 
            document.getElementById('step-result').classList.remove('hidden');
            
            const total = originalQuestions.length;
            const pct = Math.round((score / total) * 100);
            const passed = score >= 18; // Прохідний бал: 18 із 20 (90%)
            
            document.getElementById('score-val').innerText = score; 
            document.getElementById('score-total').innerText = total;
            document.getElementById('percentage-val').innerText = `${pct}% Правильних відповідей`;
            
            const icon = document.getElementById('icon-result');
            const title = document.getElementById('title-result');
            const msg = document.getElementById('msg-result');
            
            if (passed) { 
                icon.innerText = "🏆"; 
                title.innerText = "ПРОЙДЕНО"; 
                title.className = "text-3xl font-black mb-1 text-emerald-600"; 
                msg.innerText = "Вітаємо! Ваш результат успішно занесено в таблицю бази даних підприємства."; 
            } else { 
                icon.innerText = "⚠️"; 
                title.innerText = "НЕ СКЛАДЕНО"; 
                title.className = "text-3xl font-black mb-1 text-red-600"; 
                msg.innerText = `Необхідно набрати мінімум 18 балів для допуску. У вас ${score}. Будь ласка, перегляньте відео ще раз та повторіть спробу.`; 
            }
            
            const payload = { 
                formType: 'SSAFETY_AND_OCCUPATIONAL_HEALTH_AND_SAFETY_TECHNIQUES', 
                name: userName, 
                score: score, 
                total: total, 
                percent: pct, 
                passed: passed, 
                details: testLog.join(' '), 
                date: new Date().toISOString() 
            };
            
            sendToGAS(payload);
            
            const qrText = `TB:${userName}|${score}/${total}|${passed?'OK':'FAIL'}|${testLog.join('')}`;
            try { 
                new QRCode(document.getElementById("qrcode"), { text: qrText, width: 140, height: 140, correctLevel : QRCode.CorrectLevel.L }); 
            } catch (e) { console.error("QR Code Error:", e); }
        }

        function sendToGAS(p) {
            if (!navigator.onLine) { saveToOffline(p); return; }
            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) })
            .then(() => document.getElementById('sync-indicator').innerHTML = '<span class="text-emerald-500 font-bold uppercase tracking-widest text-[10px]">✅ Збережено на сервер</span>')
            .catch(() => saveToOffline(p));
        }

        function saveToOffline(p) { 
            const q = JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY) || '[]'); 
            q.push(p); 
            localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(q)); 
            document.getElementById('sync-indicator').innerHTML = '<span class="text-amber-500 font-bold uppercase tracking-widest text-[10px]">📵 Збережено офлайн (чекаємо інтернет)</span>'; 
        }

        async function processOfflineQueue() {
            if (!navigator.onLine) return; 
            const q = JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY) || '[]'); 
            if (q.length === 0) return;
            
            document.getElementById('sync-indicator').innerHTML = '<span class="text-amber-500 font-bold uppercase tracking-widest text-[10px]">Синхронізація офлайн даних...</span>';
            for (const p of [...q]) { 
                try { 
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) }); 
                    q.shift(); 
                } catch (e) { break; } 
            }
            localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(q)); 
            updateNetworkStatus();
            document.getElementById('sync-indicator').innerHTML = '<span class="text-emerald-500 font-bold uppercase tracking-widest text-[10px]">✅ Всі дані синхронізовано</span>';
        }

        function updateNetworkStatus() { 
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText'); 
            if (!navigator.onLine) { 
                dot.className = 'w-2 h-2 rounded-full bg-red-500'; 
                txt.textContent = 'Офлайн'; 
            } else { 
                dot.className = 'w-2 h-2 rounded-full bg-green-500'; 
                txt.textContent = 'Онлайн'; 
            } 
        }
    </script>
</body>
</html>
